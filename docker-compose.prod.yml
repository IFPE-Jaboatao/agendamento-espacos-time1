services:
  mysql:
    image: mysql:8.4
    restart: unless-stopped
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --log_bin_trust_function_creators=1
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - dokploy-network
    expose:
      - "3306"
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p$$MYSQL_ROOT_PASSWORD || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 40s

  # Opcional: painel SQL. Restrinja por domínio/IP no Traefik do Dokploy ou remova em produção estrita.
  adminer:
    image: adminer:latest
    restart: unless-stopped
    environment:
      ADMINER_DEFAULT_SERVER: mysql
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - dokploy-network
    expose:
      - "8080"

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: "3001"
      DB_HOST: mysql
      DB_PORT: "3306"
      DB_USER: ${MYSQL_USER}
      DB_PASS: ${MYSQL_PASSWORD}
      DB_NAME: ${MYSQL_DATABASE}
      DB_LOGGING: ${DB_LOGGING:-false}
      JWT_SECRET: ${JWT_SECRET}
      # URL pública do frontend (CORS / links); defina quando o frontend existir
      FRONTEND_URL: ${FRONTEND_URL:-}
    networks:
      - dokploy-network
    depends_on:
      mysql:
        condition: service_healthy
    expose:
      - "3001"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3001/ >/dev/null || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 60s

  # --- Frontend (Next.js): descomente quando ./frontend existir com Dockerfile ---
  # frontend:
  #   build:
  #     context: ./frontend
  #     dockerfile: Dockerfile
  #     args:
  #       NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
  #       NEXT_PUBLIC_DEV_LOGIN_ENABLED: "false"
  #   restart: unless-stopped
  #   environment:
  #     NODE_ENV: production
  #     PORT: "3000"
  #   networks:
  #     - dokploy-network
  #   depends_on:
  #     backend:
  #       condition: service_healthy
  #   expose:
  #     - "3000"
  #   healthcheck:
  #     test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1:3000/ || exit 1"]
  #     interval: 15s
  #     timeout: 5s
  #     retries: 5
  #     start_period: 60s

volumes:
  mysql_data:

networks:
  dokploy-network:
    external: true
